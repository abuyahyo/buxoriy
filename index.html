<!DOCTYPE html>
<html lang="uz-Cyrl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Имом Бухорийнинг «Саҳиҳ» тўплами</title>
<meta name="theme-color" content="#1f1a16" media="(prefers-color-scheme:dark)">
<meta name="theme-color" content="#faf3e7" media="(prefers-color-scheme:light)">
<meta name="apple-mobile-web-app-title" content="Саҳиҳ Бухорий">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=4">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%2064%2064%22%3E%3Crect%20width=%2264%22%20height=%2264%22%20rx=%2214%22%20fill=%22%23f5f0e8%22/%3E%3Ctext%20x=%2232%22%20y=%2229%22%20font-family=%22Georgia,serif%22%20font-size=%2213%22%20font-weight=%22bold%22%20fill=%22%238b6914%22%20text-anchor=%22middle%22%3E%D0%A1%D0%B0%D2%B3%D0%B8%D2%B3%3C/text%3E%3Ctext%20x=%2232%22%20y=%2246%22%20font-family=%22Georgia,serif%22%20font-size=%2210%22%20font-weight=%22bold%22%20fill=%22%238b6914%22%20text-anchor=%22middle%22%3E%D0%91%D1%83%D1%85%D0%BE%D1%80%D0%B8%D0%B9%3C/text%3E%3C/svg%3E">
<link rel="preload" href="index.json" as="fetch" crossorigin="anonymous">
<link rel="prefetch" href="data.json" as="fetch" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* SOFT MEDITATIVE — warm cream + sage + muted gold */
:root{
  --bg:#1f1a16;--surface:#2a231e;--surface2:#342c26;--surface3:#40362e;--border:#463a30;
  --text:#f5ecdb;--text-dim:#b8a890;--text-muted:#8a7c68;
  --sage:#8aa388;--sage-deep:#6d8a6a;--sage-glow:rgba(138,163,136,.18);
  --rose:#c8a098;--rose-soft:#b58a82;
  --gold:#d9b870;--gold-soft:#b89958;--gold-light:#e8d59a;--gold-dark:#b89958;
  --radius-sm:10px;--radius:18px;--radius-lg:28px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.10),0 1px 2px rgba(0,0,0,.06);
  --shadow:0 4px 16px rgba(0,0,0,.14),0 2px 6px rgba(0,0,0,.08);
  --shadow-lg:0 12px 32px rgba(0,0,0,.20),0 6px 12px rgba(0,0,0,.10);
  --ease:cubic-bezier(.2,.8,.2,1);
}
.light{
  --bg:#faf3e7;--surface:#f5ecd6;--surface2:#efe5cb;--surface3:#e8dcb8;--border:#d7cdb1;
  --text:#2a2218;--text-dim:#5a4d3e;--text-muted:#8a7d68;
  --sage:#6d8a6a;--sage-deep:#4a6a48;--sage-glow:rgba(109,138,106,.14);
  --rose:#a07568;--rose-soft:#c89a90;
  --gold:#a87a2c;--gold-soft:#8a6520;--gold-light:#8a6520;--gold-dark:#6b5010;
  --shadow-sm:0 1px 3px rgba(70,50,20,.06),0 1px 2px rgba(70,50,20,.03);
  --shadow:0 4px 14px rgba(70,50,20,.08),0 2px 5px rgba(70,50,20,.05);
  --shadow-lg:0 12px 30px rgba(70,50,20,.12),0 6px 12px rgba(70,50,20,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:'Roboto',system-ui,sans-serif;font-weight:400;min-height:100vh;transition:background .4s,color .4s;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;touch-action:manipulation}
/* Search input — pill */
.search-wrap{position:relative}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Roboto',sans-serif;font-size:16px;padding:14px 46px 14px 20px;border-radius:var(--radius-lg);outline:none;transition:border-color .3s,background .3s,box-shadow .3s;box-shadow:var(--shadow-sm)}
.search-input:focus{border-color:var(--sage);box-shadow:0 0 0 4px var(--sage-glow),var(--shadow-sm)}
.search-input::placeholder{color:var(--text-muted);font-weight:300}
.search-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;font-size:14px;opacity:.7}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:var(--text-muted);font-size:14px;width:30px;height:30px;border-radius:50%;cursor:pointer;display:none;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:color .25s,background .25s}
.search-clear:hover,.search-clear:active{color:var(--sage-deep);background:var(--surface2)}
.search-wrap.has-text .search-clear{display:flex}
.search-wrap.has-text .search-icon{display:none}

/* Breadcrumb */
.breadcrumb{position:sticky;top:0;z-index:50;padding:18px 20px 14px;border-bottom:1px solid var(--border);background:rgba(31,26,22,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.light .breadcrumb{background:rgba(250,243,231,.92)}
.breadcrumb .bc-trail{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.breadcrumb .bc-link{display:inline-block;cursor:pointer;color:var(--sage-deep);font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;padding:5px 13px;background:var(--sage-glow);border-radius:99px;transition:color .25s,background .25s,transform .2s;-webkit-tap-highlight-color:transparent}
.breadcrumb .bc-link:hover,.breadcrumb .bc-link:active{color:var(--text);background:var(--sage);transform:translateY(-1px)}
.breadcrumb .bc-sep{color:var(--text-muted);font-size:11px;margin:0 2px;opacity:.5}
.breadcrumb .bc-cur{font-size:20px;font-weight:400;color:var(--text);line-height:1.35;font-family:'Merriweather',serif;display:block;margin-top:4px;letter-spacing:-0.005em}
/* Hero (Bismillah area) */
.home-hero{text-align:center;padding:54px 20px 40px;position:relative;overflow:hidden}
.home-hero::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:700px;max-width:100%;height:500px;background:radial-gradient(ellipse at center top,var(--sage-glow),transparent 60%);pointer-events:none;z-index:0}
.home-hero > *{position:relative;z-index:1}
.bismillah-hero{font-family:'Scheherazade New',serif;font-size:54px;color:var(--gold);margin-bottom:22px;direction:rtl;line-height:1.6;letter-spacing:.01em;animation:fadeUp .8s var(--ease)}
.home-title{font-size:30px;color:var(--text);margin-bottom:10px;font-family:'Merriweather',serif;font-weight:400;line-height:1.35;letter-spacing:-0.01em;animation:fadeUp .8s var(--ease) .1s both}
.home-sub{font-size:14px;color:var(--text-dim);font-family:'Merriweather',serif;font-style:italic;font-weight:300;letter-spacing:.03em;animation:fadeUp .8s var(--ease) .2s both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hero-divider{display:flex;align-items:center;justify-content:center;gap:14px;margin:24px auto 0;max-width:200px;color:var(--sage);opacity:.6;animation:fadeUp .8s var(--ease) .3s both}
.hero-divider .line{flex:1;height:1px;background:currentColor}
.hero-divider .dot{width:6px;height:6px;background:currentColor;border-radius:50%;transform:rotate(45deg)}
.home-search{max-width:560px;margin:36px auto 0;padding:0 20px}
.grid-wrap{padding:36px 18px 140px;max-width:1100px;margin:0 auto}
.grid-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;padding:0 4px}
.grid-label{font-size:11px;text-transform:uppercase;letter-spacing:.18em;color:var(--text-muted);font-weight:500}
.grid-count{font-size:12px;color:var(--sage-deep);font-weight:500}
/* Kitob (book) cards */
.kitob-grid{display:grid;grid-template-columns:1fr;gap:14px}
@media (min-width:720px){.kitob-grid{grid-template-columns:1fr 1fr;gap:16px}}
.kitob-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:22px 22px;cursor:pointer;transition:transform .35s var(--ease),box-shadow .35s,background .25s;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;box-shadow:var(--shadow-sm)}
.kitob-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 0%,var(--sage-glow) 100%);opacity:0;transition:opacity .35s;pointer-events:none}
.kitob-card:hover,.kitob-card:active{transform:translateY(-3px);box-shadow:var(--shadow-lg);background:var(--surface3)}
.kitob-card:hover::before,.kitob-card:active::before{opacity:1}
.kitob-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;position:relative;z-index:1}
.kitob-num{font-size:11px;color:var(--sage-deep);letter-spacing:.15em;text-transform:uppercase;font-weight:600}
.kitob-name{font-size:17px;font-weight:500;color:var(--text);line-height:1.4;font-family:'Merriweather',serif;position:relative;z-index:1}
.kitob-stats{display:flex;gap:14px}
.kitob-stat{font-size:11px;color:var(--text-muted);font-weight:400}
.kitob-stat b{color:var(--text-dim);font-weight:600}
/* Bob (chapter) cards */
.bob-grid{display:grid;grid-template-columns:1fr;gap:12px}
.bob-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;cursor:pointer;transition:transform .35s var(--ease),box-shadow .35s,background .25s;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;box-shadow:var(--shadow-sm)}
.bob-card:hover,.bob-card:active{transform:translateY(-2px);box-shadow:var(--shadow);background:var(--surface3)}
.bob-num{font-size:10px;color:var(--sage-deep);letter-spacing:.14em;margin-bottom:6px;text-transform:uppercase;font-weight:600}
.bob-name{font-size:14px;font-weight:500;color:var(--text);line-height:1.55;margin-bottom:10px;font-family:'Merriweather',serif}
.bob-count{font-size:11px;color:var(--text-muted)}
.bob-izoh{font-size:12px;color:var(--text-dim);line-height:1.75;margin-top:10px;padding-top:10px;border-top:1px dashed var(--border)}
.bob-count b{color:var(--text-dim);font-weight:600}
/* Hadis list items */
.hadis-list{display:flex;flex-direction:column;gap:12px}
.hadis-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;cursor:pointer;transition:transform .35s var(--ease),box-shadow .35s,background .25s;-webkit-tap-highlight-color:transparent;box-shadow:var(--shadow-sm)}
.hadis-item:hover,.hadis-item:active{transform:translateY(-2px);box-shadow:var(--shadow);background:var(--surface3)}
.hadis-item-num{font-size:10px;color:var(--sage-deep);letter-spacing:.14em;margin-bottom:8px;text-transform:uppercase;font-weight:600}
.hadis-item-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:8px;font-family:'Merriweather',serif}
.hadis-item-preview{font-size:14px;color:var(--text);line-height:1.75;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-weight:300}
.hadis-item-narrator{font-size:11px;color:var(--text-muted);margin-top:10px;font-style:italic;font-family:'Merriweather',serif}
/* Hadis full page */
.hadis-text{padding:32px 14px 24px;margin:0 -6px 28px;line-height:1.95;color:var(--text);font-size:var(--hadis-fs,17px);font-family:'Merriweather',serif;font-weight:300;letter-spacing:.005em}
.hadis-izoh{padding:0 12px;line-height:1.85;color:var(--text-dim);font-size:calc(var(--hadis-fs,17px) - 1px);font-family:'Merriweather',serif;font-weight:300;margin-top:18px}
.hadis-num-inline{display:block;text-align:center;font-weight:600;color:var(--sage-deep);letter-spacing:.18em;margin-bottom:28px;font-family:'Merriweather',serif;font-size:13px;text-transform:uppercase;position:relative}
.hadis-num-inline::before,.hadis-num-inline::after{content:'';position:absolute;top:50%;width:50px;height:1px;opacity:.7}
.hadis-num-inline::before{left:50%;margin-left:-110px;background:linear-gradient(90deg,transparent,var(--border))}
.hadis-num-inline::after{left:50%;margin-left:60px;background:linear-gradient(90deg,var(--border),transparent)}
.hadis-toolbar{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
.hadis-tb-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);height:38px;min-width:38px;padding:0 14px;border-radius:99px;cursor:pointer;font-size:13px;font-family:'Roboto',sans-serif;font-weight:500;display:inline-flex;align-items:center;justify-content:center;gap:6px;-webkit-tap-highlight-color:transparent;transition:all .25s}
.hadis-tb-btn:hover,.hadis-tb-btn:active{border-color:var(--sage);color:var(--sage-deep);background:var(--surface2)}
.hadis-tb-btn.copied,.hadis-tb-btn.active{border-color:var(--sage);color:var(--sage-deep);background:var(--sage-glow)}
.hadis-tb-group{display:inline-flex;border:1px solid var(--border);border-radius:99px;overflow:hidden;background:var(--surface)}
.hadis-tb-group .hadis-tb-btn{border:none;border-radius:0;background:transparent;height:36px;min-width:38px;border-right:1px solid var(--border)}
.hadis-tb-group .hadis-tb-btn:last-child{border-right:none}
.hadis-tb-group .hadis-tb-btn:hover,.hadis-tb-group .hadis-tb-btn:active{background:var(--sage-glow);color:var(--sage-deep)}
.hadis-ref{color:var(--sage-deep);text-decoration:none;border-bottom:1px dashed var(--sage);cursor:pointer;transition:color .25s,border-color .25s,background .25s;padding:0 3px;border-radius:3px;font-style:italic}
.hadis-ref:hover,.hadis-ref:active{color:var(--text);border-bottom-color:var(--sage-deep);background:var(--sage-glow)}
.hadis-narrator,.hadis-source{margin-top:14px;padding:16px 18px;background:var(--surface);border-radius:var(--radius);font-size:13px;line-height:1.75;color:var(--text-dim);font-family:'Merriweather',serif;font-style:italic;font-weight:300;position:relative}
.hadis-narrator{border-left:3px solid var(--sage)}
.hadis-source{border-left:3px solid var(--rose-soft)}
.hadis-narrator strong,.hadis-source strong{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--text-muted);margin-bottom:6px;font-style:normal;font-weight:600;font-family:'Roboto',sans-serif}
.muallaqot-block{margin-bottom:24px;padding:18px 20px;background:var(--surface);border-radius:var(--radius);border-left:3px solid var(--rose-soft)}
.muallaqot-label{font-size:10px;color:var(--rose-soft);letter-spacing:.16em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:7px;font-weight:600}
.muallaqot-label::before{content:"⚑";font-size:13px}
.muallaqot-text{font-size:13px;line-height:1.85;color:var(--text-dim);font-family:'Merriweather',serif;font-weight:300}
.bob-muallaqot-badge{display:inline-flex;align-items:center;gap:5px;font-size:9px;color:var(--rose-soft);margin-left:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
/* Search results page */
.search-pg-header{margin-bottom:22px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.search-pg-title{font-size:18px;color:var(--text);margin-bottom:6px;font-family:'Merriweather',serif;font-weight:400}
.search-pg-meta{font-size:11px;color:var(--text-muted);letter-spacing:.05em}
.result-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;box-shadow:var(--shadow-sm);transition:transform .35s var(--ease),box-shadow .35s,background .25s}
.result-item:hover,.result-item:active{transform:translateY(-1px);box-shadow:var(--shadow);background:var(--surface3)}
.result-label{font-size:10px;color:var(--sage-deep);margin-bottom:6px;line-height:1.6;letter-spacing:.04em;font-weight:500}
.result-text{font-size:14px;line-height:1.7;color:var(--text-dim);font-weight:300}
.result-text mark{background:var(--sage-glow);color:var(--text);border-radius:3px;padding:1px 4px;font-weight:500}
.no-results{text-align:center;padding:60px 20px;color:var(--text-muted)}
.no-results-icon{font-size:52px;margin-bottom:18px;opacity:.4}
.result-section{margin-bottom:28px}
.result-section-header{font-size:11px;text-transform:uppercase;letter-spacing:.18em;color:var(--text-muted);margin-bottom:12px;padding:0 4px 8px;border-bottom:1px solid var(--border);font-weight:500}
.result-where{font-size:9px;color:var(--rose-soft);text-transform:uppercase;letter-spacing:.12em;margin-left:8px;padding:2px 7px;background:rgba(184,138,130,.12);border-radius:99px;font-weight:600}
.result-more-btn{display:block;width:100%;background:var(--surface);border:1px solid var(--border);color:var(--sage-deep);padding:14px;border-radius:var(--radius);cursor:pointer;font-family:'Roboto',sans-serif;font-size:13px;font-weight:500;margin-top:10px;-webkit-tap-highlight-color:transparent;transition:all .25s}
.result-more-btn:hover,.result-more-btn:active{border-color:var(--sage);background:var(--sage-glow)}
/* Floating action buttons */
.scroll-top{position:fixed;bottom:24px;right:24px;width:44px;height:44px;background:var(--surface);border:1px solid var(--border);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:18px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .35s,transform .25s,background .25s,color .25s;z-index:50;box-shadow:var(--shadow)}
.scroll-top.visible{opacity:1;pointer-events:auto}
.scroll-top:hover,.scroll-top:active{background:var(--sage);color:#fff;transform:scale(.95)}
.fab-theme{position:fixed;bottom:24px;left:24px;width:46px;height:46px;background:var(--surface);border:1px solid var(--border);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:transform .25s,background .25s;z-index:50;-webkit-tap-highlight-color:transparent;box-shadow:var(--shadow)}
.fab-theme:hover,.fab-theme:active{background:var(--surface2);transform:scale(.95) rotate(15deg)}
.fab-nav{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;background:var(--surface);border:1px solid var(--border);border-radius:99px;overflow:hidden;z-index:50;box-shadow:var(--shadow)}
.fab-nav button{background:transparent;border:none;color:var(--text-dim);width:58px;height:46px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:color .25s,background .25s;-webkit-tap-highlight-color:transparent}
.fab-nav button:hover,.fab-nav button:active{color:var(--sage-deep);background:var(--sage-glow)}
.fab-nav button.disabled{opacity:.3;pointer-events:none}
.fab-nav button + button{border-left:1px solid var(--border)}

/* Page transitions */
.page{display:none;opacity:0;transition:opacity .35s var(--ease);background:var(--bg);height:100vh;overflow-y:auto;position:fixed;top:0;left:0;right:0;bottom:0;overscroll-behavior:contain}
.page.visible{display:block;opacity:1}
#pgHome{display:block;opacity:1}

/* Loading state */
.loading-state{text-align:center;padding:50px 20px;color:var(--text-muted);font-size:13px;letter-spacing:.06em;font-weight:300}
.loading-state::before{content:"";display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--sage);border-radius:50%;animation:spin .9s linear infinite;vertical-align:middle;margin-right:12px}
@keyframes spin{to{transform:rotate(360deg)}}
@media (max-width:480px){
  .home-hero{padding:42px 18px 32px}
  .bismillah-hero{font-size:46px}
  .home-title{font-size:25px}
  .grid-wrap{padding:28px 14px 130px}
}
</style>

<script>
// Енгил китоб метамаълумоти HTML га инлайн қилинган — бош саҳифа дарҳол кўрсатилади
const BOOKS = JSON.parse(document.getElementById('books-data').textContent);
let DB = []; // дастлаб index.json (метамаълумот), сўнг data.json (тўлиқ)
let isFullDB = false;
let indexPromise = null;
let fullDataPromise = null;

let ST = { page:'home', kid:null, bid:null, hid:null };
const scrollPos = {};
let lastHash = '';
let th = localStorage.getItem('th') || 'dark';
let fs = parseInt(localStorage.getItem('fs'),10) || 16;
document.documentElement.style.setProperty('--hadis-fs',fs+'px');

function apTh(){
  document.documentElement.className=th;
  localStorage.setItem('th',th);
  const fab=document.getElementById('fabTheme');
  if(fab) fab.textContent = th==='dark' ? '☀️' : '🌙';
}

function getK(kid){ return DB.find(k=>k.id===kid); }
function getB(kid,bid){ const k=getK(kid); return k&&k.boblar.find(b=>b.id===bid); }
function getH(kid,bid,hid){ const b=getB(kid,bid); return b&&b.hadislar.find(h=>h.id===hid); }

function allH(){
  const a=[];
  DB.forEach(k=>k.boblar.forEach(b=>b.hadislar.forEach(h=>a.push({kid:k.id,bid:b.id,h}))));
  return a;
}

// Ҳадис рақамлари → {kid, bid} (cross-reference линклар учун)
let HADIS_MAP = null;
function buildHadisMap(){
  if(HADIS_MAP || !isFullDB) return;
  HADIS_MAP = new Map();
  DB.forEach(k=>k.boblar.forEach(b=>b.hadislar.forEach(h=>{
    HADIS_MAP.set(h.id, {kid:k.id, bid:b.id});
  })));
}

// Матндаги "N-ҳадис", "N ҳадисга" каби ҳаволаларни босиладиган линкка айлантириш
function linkifyRefs(html){
  if(!isFullDB) return html;
  buildHadisMap();
  return html.replace(/(\d+)([\s-]+)(ҳадис|Ҳадис|ҲАДИС)([\u0400-\u04ff]*)/g, (match, num, sep, word, suffix)=>{
    const target = HADIS_MAP.get(parseInt(num, 10));
    if(!target) return match;
    return `<a class="hadis-ref" href="#k/${target.kid}/b/${target.bid}/h/${num}" onclick="event.stopPropagation()">${num}${sep}${word}${suffix}</a>`;
  });
}

function showPage(id, scrollToId){
  const cur = document.querySelector('.page.visible');
  if(cur) scrollPos[lastHash] = cur.scrollTop;
  ['pgHome','pgBob','pgHadisList','hadisPage'].forEach(p=>{
    const el=document.getElementById(p);
    el.style.display='none';
    el.classList.remove('visible');
  });
  const el=document.getElementById(id);
  el.style.display='block';
  el.classList.add('visible');
  document.getElementById('fabNav').style.display = id==='hadisPage' ? 'flex' : 'none';
  if(scrollToId){
    setTimeout(()=>{
      const target = document.getElementById(scrollToId);
      if(target) target.scrollIntoView({block:'center'});
      lastHash = location.hash;
    }, 50);
  } else {
    setTimeout(()=>{
      const saved = scrollPos[location.hash];
      el.scrollTop = (saved != null) ? saved : 0;
      lastHash = location.hash;
    }, 0);
  }
}

function bobNomi(nomi){
  const m = nomi.match(/^(\d+-[Бб][Оо][Бб]\.?\s*)([\s\S]*)/);
  if(!m) return nomi;
  const prefix = m[1].toUpperCase();
  const rest = m[2].toLowerCase();
  // tiniш belgиlaridan keyin birinchi harfni katta qilish
  const restFormatted = rest.replace(/(^|[.?!»«(]\s*)([а-яёҳқғўҚҒЎҲa-z])/g, (match, before, letter) => before + letter.toUpperCase()).replace(/(\s)Деган(\s)/g, '$1деган$2').replace(/набий/g, 'Набий').replace(/(?<!солла)аллоҳ(?!\s*у\s*алайҳи)/g, 'Аллоҳ').replace(/муҳаммад/g, 'Муҳаммад');
  if(!/[.?!…»]$/.test(restFormatted)) return prefix + restFormatted + '.';
  return prefix + restFormatted;
}

function bc(containerId, items){
  const el=document.getElementById(containerId);
  const last = items[items.length-1];
  const lastIsTrail = !!last.fn;
  const trail = lastIsTrail ? items : items.slice(0,-1);
  const cur = lastIsTrail ? null : last;
  const trailHtml = trail.map((it, i) => {
    const sepAfter = (i < trail.length - 1 || cur) ? '<span class="bc-sep">›</span>' : '';
    return `<span class="bc-link" onclick="${it.fn}">${it.t}</span>${sepAfter}`;
  }).join('');
  const curHtml = cur ? `<span class="bc-cur">${cur.t}</span>` : '';
  el.innerHTML=`<div class="bc-trail">${trailHtml}</div>${curHtml}`;
}

function setHash(h){
  const target = h ? '#'+h : location.pathname+location.search;
  if(location.hash !== (h?'#'+h:'') ) history.pushState(null, '', target);
}

function applyHash(){
  const h = location.hash.slice(1);
  if(h.startsWith('q=')){
    const q = decodeURIComponent(h.slice(2));
    document.getElementById('searchInput').value = q;
    updateSearchUI();
    App.goHome(true);
    App.doSearch(q, true);
    return;
  }
  const m = h.match(/^k\/(\d+)(?:\/b\/(\d+)(?:\/h\/(\d+))?)?$/);
  if(!m){ App.goHome(); return; }
  const kid=+m[1], bid=m[2]?+m[2]:null, hid=m[3]?+m[3]:null;
  if(hid) App.openHadis(kid,bid,hid);
  else if(bid) App.openBob(kid,bid);
  else App.openKitob(kid);
}

function escHtml(s){ return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function escRegex(s){ return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function snippet(text, query, maxLen){
  if(!text) return '';
  maxLen = maxLen || 200;
  const t = text.replace(/\n+/g, ' ').trim();
  if(t.length <= maxLen) return t;
  const idx = t.toLowerCase().indexOf(query.toLowerCase());
  if(idx === -1) return t.substring(0, maxLen) + '…';
  const before = Math.floor((maxLen - query.length) / 2);
  let start = Math.max(0, idx - before);
  let end = Math.min(t.length, start + maxLen);
  if(end - start < maxLen && start > 0) start = Math.max(0, end - maxLen);
  let result = t.substring(start, end);
  if(start > 0) result = '…' + result;
  if(end < t.length) result = result + '…';
  return result;
}

function syncSearchToHash(q){
  const newHash = q ? '#q=' + encodeURIComponent(q) : '';
  const cur = location.hash;
  if(cur === newHash) return;
  const newUrl = newHash ? newHash : location.pathname + location.search;
  if(cur.startsWith('#q=')) history.replaceState(null, '', newUrl);
  else history.pushState(null, '', newUrl);
}

let _searchState = { query:'', kitob:[], bob:[], hadis:[], hadisShown:0 };
const SEARCH_HADIS_PAGE = 100;

function homeBcItems(){
  const items = [{t:'Бош саҳифа', fn:'App.goHome()'}];
  if(_searchState.query){
    const q = _searchState.query;
    const short = q.length > 14 ? q.substring(0,14)+'…' : q;
    items.push({t:`«${escHtml(short)}» қидирув`, fn:'App.restoreSearch()'});
  }
  return items;
}

const App = {
  goHome(_keepSearch){
    ST={page:'home',kid:null,bid:null,hid:null};
    // BOOKS — HTML га инлайн қилинган, ҳар доим мавжуд
    document.getElementById('kitobCount').textContent=BOOKS.length+' та китоб';
    const g=document.getElementById('kitobGrid');
    g.innerHTML='';
    BOOKS.forEach(k=>{
      const el=document.createElement('div');
      el.className='kitob-card';
      el.innerHTML=`<div class="kitob-top"><div class="kitob-num">${k.id}-КИТОБ</div><div class="kitob-stats"><div class="kitob-stat"><b>${k.bC}</b> боб</div><div class="kitob-stat"><b>${k.hC}</b> ҳадис</div></div></div><div class="kitob-name">${k.nomi}</div>`;
      el.onclick=()=>App.openKitob(k.id);
      g.appendChild(el);
    });
    if(!_keepSearch){
      document.getElementById('searchInput').value='';
      updateSearchUI();
      document.getElementById('searchView').style.display='none';
      document.getElementById('kitoblarView').style.display='';
      _searchState = { query:'', kitob:[], bob:[], hadis:[], hadisShown:0 };
      setHash('');
    }
    showPage('pgHome');
  },

  openKitob(kid, scrollToBid=false){
    const k=getK(kid);
    ST={page:'bob',kid,bid:null,hid:null};
    if(!k){
      // DB юкланган бўлса-да топилмаган бўлса — бош саҳифага
      if(DB.length){ App.goHome(); return; }
      // DB ҳали юкланмаган. Инлайн BOOKS дан китоб номини олиб, юкланиш индикаторини кўрсатамиз.
      const ki = BOOKS.find(b=>b.id===kid);
      if(!ki){ App.goHome(); return; }
      bc('bcBob',[...homeBcItems(),{t:ki.nomi}]);
      document.getElementById('bcBob').innerHTML+=`<div style="margin-top:10px;display:flex;gap:14px;font-size:11px;color:var(--text-muted)"><span>${ki.bC} та боб</span><span>${ki.hC} та ҳадис</span></div>`;
      document.getElementById('bobGrid').innerHTML='<div class="loading-state">Юкланмоқда…</div>';
      showPage('pgBob');
      setHash('k/'+kid);
      indexPromise.then(()=>App.openKitob(kid,scrollToBid)).catch(()=>{});
      return;
    }
    const hC=k.boblar.reduce((s,b)=>s+(b.hC ?? b.hadislar.length),0);
    bc('bcBob',[...homeBcItems(),{t:k.nomi}]);
    document.getElementById('bcBob').innerHTML+=`<div style="margin-top:10px;display:flex;gap:14px;font-size:11px;color:var(--text-muted)"><span>${k.boblar.length} та боб</span><span>${hC} та ҳадис</span></div>`;
    document.getElementById('bobPageLabel').textContent='';
    document.getElementById('bobCount').textContent='';
    const g=document.getElementById('bobGrid');
    g.innerHTML='';
    k.boblar.forEach(b=>{
      const bhC = b.hC ?? b.hadislar.length;
      const el=document.createElement('div');
      el.className='bob-card';
      el.id=`bob-card-${k.id}-${b.id}`;
      el.innerHTML=`<div class="bob-name">${bobNomi(b.nomi)}</div>${b.izoh?`<div class="bob-izoh">${b.izoh.replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>')}</div>`:''}<div class="bob-count" style="${b.izoh?'margin-top:8px':''}"><b>${bhC}</b> та ҳадис${b.muallaqot?'<span class="bob-muallaqot-badge">⚑ муаллақот</span>':''}</div>`;
      el.onclick=()=>App.openBob(kid,b.id);
      g.appendChild(el);
    });
    showPage('pgBob', scrollToBid ? `bob-card-${kid}-${scrollToBid}` : null);
    setHash('k/'+kid);
  },

  openBob(kid,bid,scrollToHid=false){
    const k=getK(kid); const b=getB(kid,bid);
    ST={page:'hadisList',kid,bid,hid:null};
    if(!k||!b){
      if(DB.length){ App.goHome(); return; }
      // DB ҳали юкланмаган
      const ki = BOOKS.find(x=>x.id===kid);
      bc('bcHadisList',[...homeBcItems(),{t:ki?ki.nomi:'',fn:`App.openKitob(${kid})`},{t:`${bid}-боб`}]);
      document.getElementById('hadisListGrid').innerHTML='<div class="loading-state">Юкланмоқда…</div>';
      showPage('pgHadisList');
      setHash('k/'+kid+'/b/'+bid);
      indexPromise.then(()=>App.openBob(kid,bid,scrollToHid)).catch(()=>{});
      return;
    }
    const bhC = b.hC ?? (b.hadislar ? b.hadislar.length : 0);
    bc('bcHadisList',[...homeBcItems(),{t:k.nomi,fn:`App.openKitob(${kid})`},{t:bobNomi(b.nomi)}]);
    document.getElementById('bcHadisList').innerHTML+=`${b.izoh?`<div style="margin-top:10px;font-size:11px;color:var(--text-muted);line-height:1.6">${linkifyRefs(b.izoh.replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>'))}</div>`:''}${bhC?`<div style="margin-top:10px;font-size:11px;color:var(--text-muted)">${bhC} та ҳадис</div>`:''}`;
    document.getElementById('hadisListLabel').textContent='';
    document.getElementById('hadisListCount').textContent='';
    const g=document.getElementById('hadisListGrid');
    g.innerHTML='';
    if(b.muallaqot){
      const mel=document.createElement('div');
      mel.className='muallaqot-block';
      mel.innerHTML=`<div class="muallaqot-label">Муаллақот</div><div class="muallaqot-text">${linkifyRefs(b.muallaqot.replace(/\n/g,'<br>'))}</div>`;
      g.appendChild(mel);
    }
    if(!isFullDB){
      const ld=document.createElement('div');
      ld.className='loading-state';
      ld.textContent='Юкланмоқда…';
      g.appendChild(ld);
      showPage('pgHadisList');
      setHash('k/'+kid+'/b/'+bid);
      fullDataPromise.then(()=>App.openBob(kid,bid,scrollToHid)).catch(()=>{});
      return;
    }
    b.hadislar.forEach(h=>{
      const el=document.createElement('div');
      el.className='hadis-item';
      el.id=`hadis-card-${kid}-${bid}-${h.id}`;
      el.innerHTML=`<div class="hadis-item-num">${h.id}-ҳадис</div><div class="hadis-item-preview">${h.matn.replace(/\n/g,' ')}</div><div class="hadis-item-narrator">${h.rowi||''}</div>`;
      el.onclick=()=>App.openHadis(kid,bid,h.id);
      g.appendChild(el);
    });
    if(!b.hadislar.length){
      const empty=document.createElement('div');
      empty.style.cssText='text-align:center;padding:40px 20px;color:var(--text-muted);font-size:13px';
      empty.textContent='Ушбу бобда ҳадис келтирилмаган.';
      g.appendChild(empty);
    }
    showPage('pgHadisList', scrollToHid ? `hadis-card-${kid}-${bid}-${scrollToHid}` : null);
    setHash('k/'+kid+'/b/'+bid);
  },

  openHadis(kid,bid,hid){
    const k=getK(kid); const b=getB(kid,bid);
    ST={page:'hadis',kid,bid,hid};
    if(!k||!b){
      if(isFullDB){ App.goHome(); return; }
      // DB ҳали юкланмаган
      const ki = BOOKS.find(x=>x.id===kid);
      bc('bcHadis',[...homeBcItems(),{t:ki?ki.nomi:'',fn:`App.openKitob(${kid})`},{t:`${bid}-боб`,fn:`App.openBob(${kid},${bid})`}]);
      document.getElementById('hadisText').innerHTML='<div class="loading-state">Юкланмоқда…</div>';
      document.getElementById('hadisNarrator').innerHTML='';
      document.getElementById('hadisSource').innerHTML='';
      document.getElementById('hadisIzoh').style.display='none';
      document.getElementById('izohBtn').style.display='none';
      document.getElementById('fabPrev').classList.add('disabled');
      document.getElementById('fabNext').classList.add('disabled');
      showPage('hadisPage');
      setHash('k/'+kid+'/b/'+bid+'/h/'+hid);
      fullDataPromise.then(()=>App.openHadis(kid,bid,hid)).catch(()=>{});
      return;
    }
    bc('bcHadis',[...homeBcItems(),{t:k.nomi,fn:`App.openKitob(${k.id})`},{t:`${b.id}-боб`,fn:`App.openBob(${k.id},${b.id})`}]);
    if(!isFullDB){
      document.getElementById('hadisText').innerHTML='<div class="loading-state">Юкланмоқда…</div>';
      document.getElementById('hadisNarrator').innerHTML='';
      document.getElementById('hadisSource').innerHTML='';
      document.getElementById('hadisIzoh').style.display='none';
      document.getElementById('izohBtn').style.display='none';
      document.getElementById('fabPrev').classList.add('disabled');
      document.getElementById('fabNext').classList.add('disabled');
      showPage('hadisPage');
      setHash('k/'+kid+'/b/'+bid+'/h/'+hid);
      fullDataPromise.then(()=>App.openHadis(kid,bid,hid)).catch(()=>{});
      return;
    }
    const h=getH(kid,bid,hid);
    if(!h) return;
    document.getElementById('hadisText').innerHTML=`<span class="hadis-num-inline">${h.id}-ҲАДИС</span> `+linkifyRefs(h.matn.replace(/\n\n/g,'<br>').replace(/\n/g,'<br>'));
    document.getElementById('hadisNarrator').innerHTML='<strong>Ривояти:</strong> '+(h.rowi||'—');
    document.getElementById('hadisSource').innerHTML='<strong>Манба:</strong> '+(h.manba||'Саҳиҳ Бухорий');
    const izohEl=document.getElementById('hadisIzoh');
    const izohBtn=document.getElementById('izohBtn');
    izohEl.style.display='none';
    izohBtn.classList.remove('active');
    if(h.izoh){izohEl.innerHTML='<strong>Изоҳ:</strong> '+linkifyRefs(h.izoh.replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>'));izohBtn.style.display='';}
    else{izohBtn.style.display='none';}
    const all=allH();
    const idx=all.findIndex(x=>x.kid===kid&&x.bid===bid&&x.h.id===hid);
    document.getElementById('fabPrev').classList.toggle('disabled', idx<=0);
    document.getElementById('fabNext').classList.toggle('disabled', idx>=all.length-1);
    showPage('hadisPage');
    setHash('k/'+kid+'/b/'+bid+'/h/'+hid);
  },

  prevHadis(){
    const all=allH();
    const idx=all.findIndex(x=>x.kid===ST.kid&&x.bid===ST.bid&&x.h.id===ST.hid);
    if(idx>0){ const p=all[idx-1]; App.openHadis(p.kid,p.bid,p.h.id); }
  },
  nextHadis(){
    const all=allH();
    const idx=all.findIndex(x=>x.kid===ST.kid&&x.bid===ST.bid&&x.h.id===ST.hid);
    if(idx<all.length-1){ const p=all[idx+1]; App.openHadis(p.kid,p.bid,p.h.id); }
  },
  goBack(){
    if(ST.page==='hadis') App.openBob(ST.kid, ST.bid, ST.hid);
    else if(ST.page==='hadisList') App.openKitob(ST.kid, ST.bid);
    else if(ST.page==='bob') App.goHome();
    else App.goHome();
  },
  toggleTheme(){ th=th==='dark'?'light':'dark'; apTh(); },
  toggleIzoh(){
    const el=document.getElementById('hadisIzoh');
    const btn=document.getElementById('izohBtn');
    const show=el.style.display==='none';
    el.style.display=show?'block':'none';
    btn.classList.toggle('active', show);
  },
  adjustFontSize(delta){
    const min=13,max=24;
    fs=Math.max(min,Math.min(max,fs+delta));
    document.documentElement.style.setProperty('--hadis-fs',fs+'px');
    localStorage.setItem('fs',fs);
  },
  copyHadis(){
    const h=getH(ST.kid,ST.bid,ST.hid); if(!h) return;
    const text=`${h.matn}\n\nРивояти: ${h.rowi||'—'}\nМанба: ${h.manba||'Саҳиҳ Бухорий'}`;
    const btn=document.getElementById('copyBtn');
    const orig=btn.textContent;
    const done=()=>{btn.textContent='✓ Нусхаланди';btn.classList.add('copied');setTimeout(()=>{btn.textContent=orig;btn.classList.remove('copied');},1500);};
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(done).catch(()=>{});
    }else{
      const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
      document.body.appendChild(ta);ta.select();
      try{document.execCommand('copy');done();}catch(e){}
      document.body.removeChild(ta);
    }
  },
  doSearch(v, fromHash){
    const trimmed = v.trim();
    const kView = document.getElementById('kitoblarView');
    const sView = document.getElementById('searchView');

    if(!fromHash) syncSearchToHash(trimmed);

    if(!trimmed){
      sView.style.display='none';
      kView.style.display='';
      _searchState = { query:'', kitob:[], bob:[], hadis:[], hadisShown:0 };
      return;
    }

    if(!isFullDB){
      kView.style.display='none';
      sView.style.display='';
      document.getElementById('searchMeta').textContent='';
      document.getElementById('searchResults').innerHTML='<div class="loading-state">Маълумот юкланмоқда…</div>';
      fullDataPromise.then(()=>App.doSearch(v, fromHash)).catch(()=>{});
      return;
    }

    const q = trimmed.toLowerCase();
    const isNum = /^\d+$/.test(trimmed);
    const kitob=[], bob=[], hadis=[];

    DB.forEach(k=>{
      if(!isNum && k.nomi.toLowerCase().includes(q)) kitob.push({k});
      k.boblar.forEach(b=>{
        if(!isNum){
          const inN = b.nomi.toLowerCase().includes(q);
          const inI = b.izoh && b.izoh.toLowerCase().includes(q);
          const inM = b.muallaqot && b.muallaqot.toLowerCase().includes(q);
          if(inN||inI||inM) bob.push({k, b, where: inN?'nomi':inI?'izoh':'muallaqot'});
        }
        b.hadislar.forEach(h=>{
          if(isNum){
            if(String(h.id)===trimmed) hadis.push({k, b, h, where:'matn'});
            return;
          }
          const inM = h.matn.toLowerCase().includes(q);
          const inR = h.rowi && h.rowi.toLowerCase().includes(q);
          const inI = h.izoh && h.izoh.toLowerCase().includes(q);
          if(inM||inR||inI) hadis.push({k, b, h, where: inM?'matn':inR?'rowi':'izoh'});
        });
      });
    });

    _searchState = { query:trimmed, kitob, bob, hadis, hadisShown: Math.min(SEARCH_HADIS_PAGE, hadis.length) };
    this._renderSearch();
    kView.style.display='none';
    sView.style.display='';
  },

  _renderSearch(){
    const s = _searchState;
    const total = s.kitob.length + s.bob.length + s.hadis.length;
    document.getElementById('searchMeta').textContent = total ? total+' та натижа' : '';
    const container = document.getElementById('searchResults');
    if(!total){
      container.innerHTML='<div class="no-results"><div class="no-results-icon">🔍</div><p>Натижа топилмади</p></div>';
      return;
    }
    const re = new RegExp(escRegex(s.query), 'gi');
    const hl = t => escHtml(t).replace(re, m=>`<mark>${m}</mark>`);
    let html='';

    if(s.kitob.length){
      html += `<div class="result-section"><div class="result-section-header">Китоблар (${s.kitob.length})</div>`;
      html += s.kitob.map(({k})=>`<div class="result-item" onclick="App.openKitob(${k.id})"><div class="result-label">${k.id}-китоб</div><div class="result-text">${hl(k.nomi)}</div></div>`).join('');
      html += '</div>';
    }

    if(s.bob.length){
      html += `<div class="result-section"><div class="result-section-header">Боблар (${s.bob.length})</div>`;
      html += s.bob.map(({k,b,where})=>{
        const txt = where==='nomi' ? b.nomi : where==='izoh' ? b.izoh : b.muallaqot;
        const lbl = where==='izoh' ? 'Изоҳда' : where==='muallaqot' ? 'Муаллақотда' : '';
        return `<div class="result-item" onclick="App.openBob(${k.id},${b.id})"><div class="result-label">${escHtml(k.nomi)} › ${b.id}-боб${lbl?' <span class="result-where">'+lbl+'</span>':''}</div><div class="result-text">${hl(snippet(txt, s.query))}</div></div>`;
      }).join('');
      html += '</div>';
    }

    if(s.hadis.length){
      const shown = s.hadis.slice(0, s.hadisShown);
      html += `<div class="result-section"><div class="result-section-header">Ҳадислар (${s.hadis.length})</div>`;
      html += shown.map(({k,b,h,where})=>{
        const txt = where==='matn' ? h.matn : where==='rowi' ? h.rowi : h.izoh;
        const lbl = where==='rowi' ? 'Ровийда' : where==='izoh' ? 'Изоҳда' : '';
        return `<div class="result-item" onclick="App.openHadis(${k.id},${b.id},${h.id})"><div class="result-label">${escHtml(k.nomi)} › ${b.id}-боб › ${h.id}-ҳадис${lbl?' <span class="result-where">'+lbl+'</span>':''}</div><div class="result-text">${hl(snippet(txt, s.query))}</div></div>`;
      }).join('');
      if(s.hadisShown < s.hadis.length){
        html += `<button class="result-more-btn" onclick="App.showMoreHadis()">Яна кўрсатиш (${s.hadis.length - s.hadisShown} та қолди)</button>`;
      }
      html += '</div>';
    }

    container.innerHTML = html;
  },

  showMoreHadis(){
    _searchState.hadisShown = Math.min(_searchState.hadisShown + SEARCH_HADIS_PAGE, _searchState.hadis.length);
    this._renderSearch();
  },

  restoreSearch(){
    if(!_searchState.query){ this.goHome(); return; }
    ST = {page:'home',kid:null,bid:null,hid:null};
    document.getElementById('searchInput').value = _searchState.query;
    updateSearchUI();
    syncSearchToHash(_searchState.query);
    this._renderSearch();
    document.getElementById('kitoblarView').style.display='none';
    document.getElementById('searchView').style.display='';
    showPage('pgHome');
  }
};

let sT;
const searchInput = document.getElementById('searchInput');
const searchWrap = document.querySelector('.home-search .search-wrap');
function updateSearchUI(){ searchWrap.classList.toggle('has-text', !!searchInput.value); }
searchInput.addEventListener('input',e=>{
  updateSearchUI();
  clearTimeout(sT); sT=setTimeout(()=>App.doSearch(e.target.value),300);
});
document.getElementById('searchClear').addEventListener('click',()=>{
  searchInput.value='';
  updateSearchUI();
  clearTimeout(sT);
  App.doSearch('');
  searchInput.focus();
});
['pgHome','pgBob','pgHadisList','hadisPage'].forEach(pageId=>{
  const el = document.getElementById(pageId);
  el.addEventListener('scroll',()=>{
    document.getElementById('scrollTop').className='scroll-top'+(el.scrollTop>400?' visible':'');
  });
});
document.getElementById('scrollTop').onclick=()=>{
  const pageIdMap={home:'pgHome',bob:'pgBob',hadisList:'pgHadisList',hadis:'hadisPage'};
  const curId=pageIdMap[ST.page]||'pgHome';
  document.getElementById(curId).scrollTo({top:0,behavior:'smooth'});
};

apTh();
window.addEventListener('popstate', applyHash);
window.addEventListener('hashchange', applyHash);

// Аввал орқа фонда юклашни бошлаймиз — preload билан биргаликда HTML парсингидан
// бошлаб юклана бошлайди. Promise лар applyHash() ичидаги юкланиш индикаторлари учун керак.
fullDataPromise = fetch('data.json')
  .then(r => { if (!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(d => { DB = d; isFullDB = true; return d; });

indexPromise = fetch('index.json')
  .then(r => { if (!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(d => { if(!isFullDB){ DB = d; } return d; });

// Бош саҳифани дарҳол кўрсатамиз (BOOKS HTML га инлайн қилинган).
applyHash();

fullDataPromise.catch(e => {
  document.querySelectorAll('.loading-state').forEach(el => {
    el.textContent = 'Маълумот юкланмади: '+e.message;
  });
});
indexPromise.catch(() => {/* data.json орқали тиклаш мумкин */});
</script>
